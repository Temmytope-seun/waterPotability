<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Potability Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 { text-align: center; }

        p.subtitle {
            text-align: center;
            color: #555;
            margin-top: -10px;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .hint {
            font-size: 0.8em;
            color: #777;
            font-weight: normal;
            margin-left: 6px;
        }

        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #1565C0;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }

        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <h1>Water Potability Prediction</h1>
    <p class="subtitle">Enter water sample measurements to predict if it is safe to drink.</p>

    <form action="/predict" method="POST">

        <div class="form-group">
            <label>pH <span class="hint">(0 – 14)</span></label>
            <input type="number" step="any" name="ph" placeholder="e.g. 7.0" required>
        </div>

        <div class="form-group">
            <label>Hardness <span class="hint">(mg/L)</span></label>
            <input type="number" step="any" name="hardness" placeholder="e.g. 196.0" required>
        </div>

        <div class="form-group">
            <label>Solids (TDS) <span class="hint">(ppm)</span></label>
            <input type="number" step="any" name="solids" placeholder="e.g. 20791.0" required>
        </div>

        <div class="form-group">
            <label>Chloramines <span class="hint">(ppm)</span></label>
            <input type="number" step="any" name="chloramines" placeholder="e.g. 7.3" required>
        </div>

        <div class="form-group">
            <label>Sulfate <span class="hint">(mg/L)</span></label>
            <input type="number" step="any" name="sulfate" placeholder="e.g. 368.0" required>
        </div>

        <div class="form-group">
            <label>Conductivity <span class="hint">(μS/cm)</span></label>
            <input type="number" step="any" name="conductivity" placeholder="e.g. 564.0" required>
        </div>

        <div class="form-group">
            <label>Organic Carbon <span class="hint">(ppm)</span></label>
            <input type="number" step="any" name="organic_carbon" placeholder="e.g. 10.4" required>
        </div>

        <div class="form-group">
            <label>Trihalomethanes <span class="hint">(μg/L)</span></label>
            <input type="number" step="any" name="trihalomethanes" placeholder="e.g. 86.0" required>
        </div>

        <div class="form-group">
            <label>Turbidity <span class="hint">(NTU)</span></label>
            <input type="number" step="any" name="turbidity" placeholder="e.g. 2.96" required>
        </div>

        <button type="submit">Check Water Safety</button>

    </form>

</body>
</html>
