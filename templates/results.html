<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            width: 500px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .result {
            font-size: 2rem;
            font-weight: bold;
            color: #4CAF50;
            margin: 20px 0;
        }

        .description {
            color: #666;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
        }

        .btn:hover {
            background-color: #45a049;
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>Wine Quality Prediction</h1>

        <div class="result">
            {{ prediction }}
        </div>

        <div class="description">
            Predicted Wine Quality Score
        </div>

        <a href="/" class="btn">Predict Another Wine</a>
    </div>

</body>
</html>
